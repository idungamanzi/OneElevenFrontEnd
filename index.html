<!DOCTYPE html>
<html>
<head>
    <title>One Eleven Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Testing API Endpoint</h2>

        <form id="testform">
            <label>Email:</label><br />
            <input type="email" id="email" required /><br /><br />

            <label>API URL</label><br />
            <input type="text" id="url" required /><br /><br />

            <button type="submit">Test</button>
        </form>

        <div class="response-container">
            <pre id="result">Response will appear here.</pre>
        </div>
    </div>
    <script>
        document.getElementById("testform").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const url = document.getElementById("url").value;
            const resultContainer = document.getElementById("result");

            resultContainer.textContent = "Validating..."
            try {
                const testURL = `https://yhxzjyykdsfkdrmdxgho.supabase.co/functions/v1/application-task?url=${url}&email=${email}`;

                const response = await fetch(testURL);
                const data = await response.json();

                resultContainer.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultContainer.textContent = "An error occurred while validation.";
            }
        });
    </script>
</body>

</html>
